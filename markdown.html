<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchMart - Interactive Architecture & Design Docs</title>
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Mermaid.js for drawing diagrams -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
        
        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --primary: #c5a880;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --border: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar navigation list */
        .sidebar {
            width: 280px;
            background-color: #0b0f19;
            border-right: 1px solid var(--border);
            padding: 2rem 1.5rem;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar h2 {
            font-size: 1.3rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--primary);
            margin-bottom: 2rem;
        }

        .doc-menu {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .doc-menu li a {
            color: var(--text-sub);
            text-decoration: none;
            font-size: 0.95rem;
            display: block;
            padding: 0.6rem 1rem;
            border-radius: 6px;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
        }

        .doc-menu li a:hover, .doc-menu li a.active {
            color: var(--text-main);
            background-color: rgba(197, 168, 128, 0.15);
            border-left-color: var(--primary);
        }

        /* Main Content Area */
        .content-container {
            margin-left: 280px;
            flex: 1;
            padding: 3rem 5%;
            max-width: 1000px;
        }

        /* Markdown styling rules */
        #doc-render-target {
            line-height: 1.7;
        }

        #doc-render-target h1 {
            font-size: 2.2rem;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid var(--border);
            padding-bottom: 0.5rem;
            color: var(--primary);
        }

        #doc-render-target h2 {
            font-size: 1.6rem;
            margin-top: 2rem;
            margin-bottom: 1rem;
            color: var(--text-main);
        }

        #doc-render-target h3 {
            font-size: 1.25rem;
            margin-top: 1.5rem;
            margin-bottom: 0.8rem;
            color: var(--primary);
        }

        #doc-render-target p {
            margin-bottom: 1.2rem;
            color: var(--text-sub);
        }

        #doc-render-target ul, #doc-render-target ol {
            margin-left: 2rem;
            margin-bottom: 1.2rem;
            color: var(--text-sub);
        }

        #doc-render-target li {
            margin-bottom: 0.4rem;
        }

        #doc-render-target code {
            background-color: #1e293b;
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-family: monospace;
            color: #ff79c6;
            font-size: 0.9em;
        }

        #doc-render-target pre {
            background-color: #0b0f19;
            padding: 1.5rem;
            border-radius: 8px;
            overflow-x: auto;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border);
        }

        #doc-render-target pre code {
            background-color: transparent;
            padding: 0;
            color: #f8fafc;
        }

        /* Mermaid styling */
        .mermaid {
            background: white !important;
            padding: 1.5rem;
            border-radius: 8px;
            margin: 1.5rem 0;
            display: flex;
            justify-content: center;
        }

        /* Alert styling */
        blockquote {
            background: rgba(197, 168, 128, 0.05);
            border-left: 4px solid var(--primary);
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            font-style: italic;
            border-radius: 0 8px 8px 0;
        }

        blockquote p {
            margin-bottom: 0 !important;
            color: var(--text-main) !important;
        }

        /* Loading Indicator */
        .loader {
            display: flex;
            justify-content: center;
            margin-top: 5rem;
            color: var(--primary);
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }
            .content-container {
                margin-left: 0;
                padding: 2rem;
            }
        }
    </style>
</head>
<body>

    <!-- Sidebar Navigation -->
    <div class="sidebar">
        <h2>WatchMart Docs</h2>
        <ul class="doc-menu">
            <li><a href="#" class="active" onclick="loadDoc('analysis_design.md')">Analysis & Design</a></li>
            <li><a href="#" onclick="loadDoc('README.md')">README.md</a></li>
            <li><a href="index.html">← กลับหน้าร้านค้า</a></li>
        </ul>
    </div>

    <!-- Main Content Area -->
    <div class="content-container">
        <div id="loading" class="loader">กำลังดึงข้อมูลเอกสาร...</div>
        <div id="doc-render-target"></div>
    </div>

    <script>
        // Configure marked.js to render custom codes (specifically mermaid code blocks)
        marked.setOptions({
            gfm: true,
            breaks: true
        });

        // Initialize Mermaid
        mermaid.initialize({ startOnLoad: false, theme: 'default' });

        async function loadDoc(fileName) {
            document.getElementById('loading').style.display = 'flex';
            document.getElementById('doc-render-target').innerHTML = '';

            // Update active menu link
            document.querySelectorAll('.doc-menu a').forEach(a => {
                if (a.getAttribute('onclick')?.includes(fileName)) {
                    a.classList.add('active');
                } else {
                    a.classList.remove('active');
                }
            });

            try {
                const response = await fetch(fileName);
                if (!response.ok) {
                    throw new Error(`Failed to load ${fileName}`);
                }
                const markdownText = await response.text();
                
                // Parse markdown content
                const htmlContent = marked.parse(markdownText);
                document.getElementById('doc-render-target').innerHTML = htmlContent;
                document.getElementById('loading').style.display = 'none';

                // Look for code blocks that are labeled as mermaid and convert them
                const codeBlocks = document.querySelectorAll('pre code.language-mermaid');
                codeBlocks.forEach((block, index) => {
                    const rawMermaid = block.innerText;
                    const container = block.parentElement; // pre tag
                    
                    // Create a div with class 'mermaid' and assign unique ID
                    const mermaidDiv = document.createElement('div');
                    mermaidDiv.className = 'mermaid';
                    mermaidDiv.id = `mermaid-diagram-${index}`;
                    mermaidDiv.innerHTML = rawMermaid;
                    
                    // Replace the pre code block with the mermaid div
                    container.parentNode.replaceChild(mermaidDiv, container);
                });

                // Trigger mermaid render
                await mermaid.run();

            } catch (error) {
                console.error(error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('doc-render-target').innerHTML = `
                    <div style="color: #ef5350; background: rgba(239, 83, 80, 0.1); padding: 1.5rem; border-radius: 8px; border: 1px solid #ef5350;">
                        <h3>เกิดข้อผิดพลาดในการโหลดเอกสาร</h3>
                        <p>${error.message}</p>
                        <p>กรุณาตรวจสอบว่ามีไฟล์ <strong>${fileName}</strong> อยู่ในเครื่องจริง และรันเซิร์ฟเวอร์ด้วย Live Server หรือ Deploy ลง GitHub Pages เรียบร้อยแล้ว</p>
                    </div>
                `;
            }
        }

        // Load default document on load
        window.addEventListener('DOMContentLoaded', () => {
            loadDoc('analysis_design.md');
        });
    </script>
</body>
</html>
